<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #000;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 6vh 6vw;
    font-family: 'Jost', sans-serif;
    color: #eee;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4.5vh;
    width: 100%;
    max-width: 780px;
  }

  .middle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4vw;
    width: 100%;
  }

  .names {
    display: flex;
    flex-direction: column;
    gap: 1.4em;
    flex: 1;
  }

  .names.left { align-items: flex-end; text-align: right; }
  .names.right { align-items: flex-start; text-align: left; }

  .names span {
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    color: #f5f5f0;
  }

  .frame {
    width: 280px;
    flex-shrink: 0;
    aspect-ratio: 3 / 4;
    max-height: 55vh;
    border: 1px solid rgba(255, 255, 255, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #050505;
  }

  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .frame .placeholder {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.3);
  }

  @media (max-width: 560px) {
    .middle {
      flex-direction: column;
      gap: 3vh;
    }
    .names.left, .names.right {
      align-items: center;
      text-align: center;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8em 1.5em;
    }
    .frame {
      width: min(280px, 70vw);
    }
  }

  .credit {
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    text-align: center;
    color: rgba(255, 255, 255, 0.55);
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="word">Mighty chayce rangers ARG Credits</div>

    <div class="middle">
      <div class="names left">
        <span>Knowble6 writer/Director</span>
        <span>Mike5chap5 Artist </span>
      </div>

      <div class="frame">
 <img src="Untitled19_20260708190744.PNG"     
      </div>
      <div class="names right">
        <span>Specs Green chayce ranger</span>
        <span>bluddy</span>
      </div>
    </div>

    <div class="credit">speical thanks guager</div>
  </div>

</body>
</html>

<audio autoplay>
  <source src="eggroom.mp3" type="audio/mpeg" />
</audio>
